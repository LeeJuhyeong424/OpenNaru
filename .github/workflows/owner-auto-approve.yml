name: 소유자 PR 자동 승인

on: pull_request

permissions:
  pull-requests: write

jobs:
  auto-approve:
    name: 소유자 PR 자동 승인
    runs-on: ubuntu-latest
    if: github.actor == 'LeeJuhyeong424'
    steps:
      - name: PR 자동 승인
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
