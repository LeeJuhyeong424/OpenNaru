name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: opennaru_test
          POSTGRES_USER: opennaru
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opennaru"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: 의존성 설치
        run: pip install -r requirements-dev.txt

      - name: Ruff 린트
        run: ruff check .

      - name: pytest 실행 (커버리지 포함)
        env:
          DATABASE_URL: postgresql://opennaru:testpassword@localhost:5432/opennaru_test
          APP_SECRET_KEY: ci-test-secret-key-for-testing-only
          APP_ENV: test
        run: pytest --cov --cov-branch --cov-report=xml --tb=short -q

      - name: Codecov 업로드
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: backend
          fail_ci_if_error: false

  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Node.js 설정
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 의존성 설치
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: 빌드
        run: npm run build
